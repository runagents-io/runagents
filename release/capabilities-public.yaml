version: 1
updated_at: "2026-05-13"
purpose: >-
  Public capability registry for shipped RunAgents surfaces. This intentionally
  tracks only released functionality that should stay aligned across the API,
  Python SDK, CLI, MCP server, docs, and public assistant workflow skills.

surfaces:
  api:
    kind: source_of_truth
    description: Public HTTP contract in the OpenAPI spec.
  sdk_python:
    kind: product_surface
    description: Public Python SDK client and helpers.
  cli:
    kind: product_surface
    description: Public RunAgents operator CLI.
  mcp:
    kind: assistant_surface
    description: Public MCP tools backed by the Python SDK.
  docs:
    kind: documentation_surface
    description: Public docs that describe the shipped capability.
  assistant_workflows:
    kind: assistant_surface
    description: Public skills and workflow packs for AI coding assistants.

capabilities:
  agents:
    description: Manage deployed agents and inspect agent configuration.
    surfaces:
      api:
        evidence:
          - path: openapi/openapi.yaml
            contains: "/agents:"
      sdk_python:
        evidence:
          - path: sdk/python/runagents/client.py
            contains: "class _AgentResource:"
      cli:
        evidence:
          - path: cli/internal/commands/root.go
            contains: "newAgentsCmd()"
      mcp:
        evidence:
          - path: sdk/python/runagents/mcp/server.py
            contains: "def list_agents() -> str:"
      docs:
        evidence:
          - path: docs-site/docs/api/agents.md
            contains: "# Agents API"
      assistant_workflows:
        evidence:
          - path: skills/runagents-agent-authoring/SKILL.md
            contains: "# RunAgents Agent Authoring"

  deploy:
    description: Deploy agents from source, images, drafts, or catalog templates.
