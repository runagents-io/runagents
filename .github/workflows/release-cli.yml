name: Release RunAgents

# Triggered by pushing a tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub release + upload assets
  packages: write

jobs:
  goreleaser:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: cli/go.sum

      - name: Verify CLI source exists
        run: ls cli/cmd/runagents/main.go

      - name: Verify Python SDK source exists
        run: ls sdk/python/pyproject.toml sdk/python/runagents/mcp/server.py

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Sync release versions
        run: python3 scripts/sync_release_versions.py "${GITHUB_REF_NAME#v}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1

      - name: Publish to npm
        working-directory: cli/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version --allow-same-version
          npm pkg set binaryVersion="$VERSION"
          npm publish --access public

      - name: Build Python SDK artifacts
        run: |
          python3 -m pip install --upgrade build
          python3 -m build sdk/python

      - name: Upload Python SDK artifacts to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" sdk/python/dist/* --clobber

      - name: Publish Python SDK to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "PYPI_TOKEN not set; skipping PyPI publish"
            exit 0
          fi
          python3 -m pip install --upgrade twine
          python3 -m twine upload sdk/python/dist/*
