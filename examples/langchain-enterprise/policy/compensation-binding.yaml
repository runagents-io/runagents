# Requires approval for write operations to compensation API.
#
# Apply with:
#   kubectl apply -f policy/compensation-binding.yaml

---
apiVersion: platform.ai/v1alpha1
kind: Policy
metadata:
  name: hr-assistant-compensation-api
  namespace: default
spec:
  policies:
    - permission: approval_required
      resource: https://compensation.hr-api.your-company.com/*
      operations: [POST, PUT, PATCH, DELETE]
  approvals:
    - name: compensation-writes
      resource: https://compensation.hr-api.your-company.com/*
      operations: [POST, PUT, PATCH, DELETE]
      approvers:
        groups: [hr-admins]
        match: any
      defaultDuration: 1h
      delivery:
        fallbackToUI: true

---
apiVersion: platform.ai/v1alpha1
kind: PolicyBinding
metadata:
  name: hr-assistant-compensation-api
  namespace: default
spec:
  subjects:
    - kind: ServiceAccount
      name: hr-assistant
      namespace: default
  policyRef:
    name: hr-assistant-compensation-api
