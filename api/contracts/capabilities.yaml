version: 1
updated_at: "2026-05-13"
purpose: >-
  First-pass private capability registry for SDK, CLI, MCP, docs, and assistant-workflow parity.
  The registry records what surfaces should expose each capability family and what file-level evidence
  currently proves that coverage exists.

surfaces:
  api:
    kind: source_of_truth
    description: Backend routes and handlers.
  http_api:
    kind: generation_source
    description: Structured public HTTP/OpenAPI contract used for SDK, CLI, MCP, and docs generation.
  sdk_python:
    kind: product_surface
    description: Typed Python client and runtime-facing helper surface.
  cli:
    kind: product_surface
    description: Go operator CLI.
  mcp:
    kind: assistant_surface
    description: Assistant-facing MCP tools built on top of the Python client.
  docs:
    kind: descriptive_surface
    description: Public docs and reference pages.
  assistant_workflows:
    kind: downstream_surface
    description: Assistant setup guides, templates, and action-plan workflows layered on CLI and MCP.

capabilities:
  agents:
    description: List, inspect, and deploy agents.
    owner: governance
    status: implemented
    surfaces:
      api:
        required: true
        coverage: full
        evidence:
          - path: services/governance/internal/governance/console_api.go
            contains: 'mux.HandleFunc("/api/agents", h.requireWorkspaceAPIHandler(h.handleListAgents))'
      http_api:
        required: true
        coverage: full
        evidence:
          - path: api/contracts/openapi.yaml
            contains: '/agents:'
          - path: api/contracts/openapi.yaml
            contains: '/deploy:'
      sdk_python:
        required: true
        coverage: full
        evidence:
          - path: sdk/python/runagents/client.py
            contains: 'self.agents = _AgentResource(self)'
          - path: sdk/python/runagents/client.py
            contains: 'def deploy('
      cli:
        required: true
        coverage: full
        evidence:
          - path: cli/internal/commands/root.go
            contains: 'rootCmd.AddCommand(newAgentsCmd())'
          - path: cli/internal/commands/root.go
            contains: 'rootCmd.AddCommand(newDeployCmd())'
      mcp:
        required: true
        coverage: full
        evidence:
          - path: sdk/python/runagents/mcp/server.py
            contains: 'def list_agents() -> str:'
          - path: sdk/python/runagents/mcp/server.py
            contains: 'def deploy_agent('
      docs:
        required: true
        coverage: full
        evidence:
          - path: docs-site/docs/api/agents.md
            contains: '# Agents API'
          - path: docs-site/docs/sdk/index.md
            contains: 'client.agents.deploy('
      assistant_workflows:
        required: true
        coverage: partial
        evidence:
          - path: docs-site/docs/cli/ai-assistant-setup.md
            contains: '| `deploy_agent` | Deploy an agent from source or image | Mutate |'

