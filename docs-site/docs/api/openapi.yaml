      summary: Rotate a workspace API key
      description: >
        Rotate a programmatic workspace token and return a new secret. Existing
        non-expired keys retain their expiry window unless a new one is
        supplied.
      parameters:
        - $ref: '#/components/parameters/KeyId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateWorkspaceApiKeyRequest'
      responses:
        '200':
          description: API key rotated and new secret token returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWorkspaceApiKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
