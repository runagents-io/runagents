openapi: 3.1.0
info:
  title: RunAgents API
  version: v1alpha
  summary: Target programmatic REST API contract for RunAgents.
  description: >
    This OpenAPI document is the target machine-readable contract for the
    RunAgents programmatic API. It is the source contract for generated SDK,
    CLI, and assistant-facing integrations where coverage exists. Tenant and
    workspace context are carried by the base URL. Caller identity, scopes, and
    optional default workspace are carried by the bearer token. Kubernetes
    namespaces are an internal implementation detail and are not part of this
    public contract.
servers:
  - url: https://{trialId}.try.runagents.io/api/v1
    description: Trial host with one default workspace.
    variables:
      trialId:
        default: 1406e38143ac0e57
        description: Trial workspace host id.
  - url: https://{company}.runagents.io/api/v1
    description: Company host using the caller token's default workspace.
    variables:
      company:
        default: acme
        description: Company tenant slug.
  - url: https://{company}.runagents.io/api/v1/workspaces/{workspace}
    description: Company host with an explicit workspace in the base URL.
    variables:
      company:
        default: acme
        description: Company tenant slug.
      workspace:
        default: revops
        description: Workspace slug inside the company tenant.
security:
  - bearerAuth: []
tags:
  - name: Approvals
    description: Policy-driven access request workflows.
  - name: Action Plans
    description: Deterministic validate-then-apply workflows for assistant-driven changes.
  - name: Runs
    description: Agent run lifecycle, events, and blocked actions.
  - name: Catalog
    description: Discover and inspect catalog agent blueprints.
  - name: Context
    description: Export workspace state for external assistants and automation.
  - name: Deploy
    description: Deploy and seed agents programmatically.
  - name: Policies
    description: Policy rules and approval routing.
  - name: Approval Connectors
    description: External approval delivery connectors and defaults.
  - name: Workspace Auth
    description: Workspace token configuration and programmatic API key lifecycle.
  - name: Identity Providers
    description: End-user JWT identity provider configuration.
  - name: Agents
    description: Deployed agent lifecycle and invocation.
  - name: Tools
    description: External tool registration and probing.
  - name: Model Providers
    description: Provider registration and OpenAI-compatible gateway access.
  - name: Builds
    description: Asynchronous agent build workflows.
  - name: Billing
    description: Workspace billing, usage metering, and Stripe session flows.
  - name: Ingestion
    description: Source-code analysis and lightweight requirements detection.
paths:
  /approvals/requests:
    get:
      tags: [Approvals]
      summary: List approval requests
      parameters:
        - name: status
          in: query
          description: Filter requests by lifecycle status.
          schema:
            $ref: '#/components/schemas/ApprovalStatus'
      responses:
        '200':
          description: Approval requests ordered by creation time.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Approvals]
      summary: Create an access request
      description: >
        Create a policy-driven access request. When the same blocked action is
        retried within the same pending run context, the platform may return the
        existing pending request instead of creating a new one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccessRequest'
      responses:
        '201':
          description: New approval request created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRequest'
        '200':
          description: Existing pending request reused.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /approvals/requests/{requestId}:
    get:
      tags: [Approvals]
      summary: Get an approval request
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Approval request record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /approvals/requests/{requestId}/approve:
    post:
      tags: [Approvals]
      summary: Approve an approval request
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecision'
      responses:
        '200':
          description: Approval request approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /approvals/requests/{requestId}/reject:
    post:
      tags: [Approvals]
      summary: Reject an approval request
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectionDecision'
      responses:
        '200':
          description: Approval request rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /runs:
    get:
      tags: [Runs]
      summary: List runs
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RunStatus'
      responses:
        '200':
          description: Matching runs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Run'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Runs]
      summary: Create a run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRun'
      responses:
        '201':
          description: Run created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /runs/{runId}:
    get:
      tags: [Runs]
      summary: Get run details
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Runs]
      summary: Update run status
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRunStatus'
      responses:
        '200':
          description: Run updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /runs/{runId}/events:
    get:
      tags: [Runs]
      summary: List run events
      parameters:
        - $ref: '#/components/parameters/RunId'
        - name: after_seq
          in: query
          schema:
            type: integer
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Events ordered by sequence number.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Runs]
      summary: Add a run event
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunEvent'
      responses:
        '201':
          description: Event appended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /runs/{runId}/actions:
    post:
      tags: [Runs]
      summary: Create a blocked action
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlockedAction'
      responses:
        '201':
          description: Blocked action created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedAction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /runs/{runId}/actions/{actionId}:
    get:
      tags: [Runs]
      summary: Get blocked action status
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/ActionId'
      responses:
        '200':
          description: Blocked action details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedAction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /runs/{runId}/actions/{actionId}/approve:
    post:
      tags: [Runs]
      summary: Approve a blocked action
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/ActionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveBlockedAction'
      responses:
        '200':
          description: Blocked action approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedAction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /catalog:
    get:
      tags: [Catalog]
      summary: List catalog agents
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          description: Single category or CSV list.
          schema:
            type: string
        - name: tag
          in: query
          description: Single tag or CSV list.
          schema:
            type: string
        - name: integration
          in: query
          description: Single integration or CSV list.
          schema:
            type: string
        - name: governance
          in: query
          description: Single governance trait or CSV list.
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 24
      responses:
        '200':
          description: Paginated catalog entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /catalog/{catalogId}:
    get:
      tags: [Catalog]
      summary: Get the latest catalog manifest
      parameters:
        - $ref: '#/components/parameters/CatalogId'
        - name: version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Catalog manifest.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogManifest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /catalog/{catalogId}/versions:
    get:
      tags: [Catalog]
      summary: List catalog versions
      parameters:
        - $ref: '#/components/parameters/CatalogId'
      responses:
        '200':
          description: Published catalog versions in descending semver order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogVersionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /deploy:
    post:
      tags: [Deploy]
      summary: Deploy an agent
      description: >
        Deploy or update an agent programmatically. Provide at least one of
        `image`, `source_files`, or `artifact_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
      responses:
        '201':
          description: Deploy accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /deploy/preview:
    post:
      tags: [Deploy]
      summary: Preview deploy behavior
      description: >
        Evaluate how a deploy request will execute before mutating resources.
        This is primarily used by the console deploy flow to explain build and
        runtime decisions before a deploy is submitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
      responses:
        '200':
          description: Predicted deploy execution path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployPreviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /deploy-drafts:
    get:
      tags: [Deploy]
      summary: List deploy drafts
      description: >
        List draft deployment workflows for the current caller and workspace.
        Drafts are used by console and assistant workflows to preserve build,
        connect, and deploy state before an agent is deployed.
      operationId: listDeployDrafts
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DeployDraftStatus'
          description: Defaults to `IN_PROGRESS`.
        - name: mine
          in: query
          schema:
            type: string
            enum: ["0", "1"]
          description: Defaults to `1`, returning drafts owned by the caller.
      responses:
        '200':
          description: Deploy drafts for the current workspace.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeployDraft'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Deploy]
      summary: Create a deploy draft
      operationId: createDeployDraft
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployDraftInput'
      responses:
        '201':
          description: Deploy draft created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployDraft'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /deploy-drafts/{draftId}:
    get:
      tags: [Deploy]
      summary: Get a deploy draft
      operationId: getDeployDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          description: Deploy draft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployDraft'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Deploy]
      summary: Patch a deploy draft
      operationId: patchDeployDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployDraftPatch'
      responses:
        '200':
          description: Deploy draft updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployDraft'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Deploy]
      summary: Delete a deploy draft
      operationId: deleteDeployDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          description: Deploy draft deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /deploy-drafts/{draftId}/complete:
    post:
      tags: [Deploy]
      summary: Mark a deploy draft complete
      operationId: completeDeployDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          description: Deploy draft marked complete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployDraft'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /deploy-drafts/{draftId}/abandon:
    post:
      tags: [Deploy]
      summary: Mark a deploy draft abandoned
      operationId: abandonDeployDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          description: Deploy draft marked abandoned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployDraft'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /starter-kit:
    post:
      tags: [Deploy]
      summary: Seed the starter kit
      responses:
        '201':
          description: Demo resources created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StarterKitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /policies:
    get:
      tags: [Policies]
      summary: List policies
      responses:
        '200':
          description: Policies in the current workspace.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Policy'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Policies]
      summary: Create a policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyUpsertRequest'
      responses:
        '201':
          description: Policy created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /policies/{policyName}:
    get:
      tags: [Policies]
      summary: Get a policy
      parameters:
        - $ref: '#/components/parameters/PolicyName'
      responses:
        '200':
          description: Policy with usage metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Policies]
      summary: Replace a policy
      parameters:
        - $ref: '#/components/parameters/PolicyName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyUpsertRequest'
      responses:
        '200':
          description: Policy replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Policies]
      summary: Delete a policy
      parameters:
        - $ref: '#/components/parameters/PolicyName'
      responses:
        '200':
          description: Policy deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /policies/translate:
    post:
      tags: [Policies]
      summary: Translate natural language into policy rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslatePolicyRequest'
      responses:
        '200':
          description: Structured policy rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatePolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /approval-connectors:
    get:
      tags: [Approval Connectors]
      summary: List approval connectors
      responses:
        '200':
          description: Approval connectors in the current workspace.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApprovalConnector'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Approval Connectors]
      summary: Create an approval connector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalConnectorCreate'
      responses:
        '201':
          description: Approval connector created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalConnector'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /approval-connectors/{connectorId}:
    get:
      tags: [Approval Connectors]
      summary: Get an approval connector
      parameters:
        - $ref: '#/components/parameters/ConnectorId'
      responses:
        '200':
          description: Approval connector.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalConnector'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Approval Connectors]
      summary: Update an approval connector
      parameters:
        - $ref: '#/components/parameters/ConnectorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalConnectorPatch'
      responses:
        '200':
          description: Approval connector updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalConnector'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Approval Connectors]
      summary: Delete an approval connector
      parameters:
        - $ref: '#/components/parameters/ConnectorId'
      responses:
        '200':
