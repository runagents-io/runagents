openapi: 3.1.0
info:
  title: RunAgents API
  version: v1alpha
  summary: Public REST API contract for RunAgents.
  description: 'This OpenAPI document is the canonical machine-readable contract for
    the public RunAgents REST API where coverage exists.

    '
servers:
- url: https://api.runagents.io
security:
- bearerAuth: []
tags:
- name: Approval Connectors
  description: External approval delivery connectors and defaults.
paths:
  /api/settings/approval-connectors:
    get:
      tags:
      - Approval Connectors
      summary: List approval connectors
      responses:
        '200':
          description: Approval connectors in the current workspace.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApprovalConnector'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: getApiSettingsApprovalConnectors
    post:
      tags:
      - Approval Connectors
      summary: Create an approval connector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalConnectorCreate'
      responses:
        '201':
          description: Approval connector created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalConnector'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: postApiSettingsApprovalConnectors
  /api/settings/approval-connectors/{connectorId}:
    get:
      tags:
      - Approval Connectors
      summary: Get an approval connector
      parameters:
      - $ref: '#/components/parameters/ConnectorId'
      responses:
        '200':
          description: Approval connector.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalConnector'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: getApiSettingsApprovalConnectorsByConnectorId
    patch:
      tags:
      - Approval Connectors
      summary: Update an approval connector
      parameters:
      - $ref: '#/components/parameters/ConnectorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalConnectorPatch'
      responses:
        '200':
          description: Approval connector updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalConnector'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: patchApiSettingsApprovalConnectorsByConnectorId
    delete:
      tags:
      - Approval Connectors
      summary: Delete an approval connector
      parameters:
      - $ref: '#/components/parameters/ConnectorId'
      responses:
        '200':
          description: Approval connector deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: deleteApiSettingsApprovalConnectorsByConnectorId
  /api/settings/approval-connectors/test:
    post:
      tags:
      - Approval Connectors
      summary: Test an approval connector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalConnectorTestRequest'
      responses:
        '200':
          description: Connector validation/test result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalConnectorTestResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: postApiSettingsApprovalConnectorsTest
  /api/settings/approval-connectors/defaults:
    get:
      tags:
      - Approval Connectors
      summary: Get connector defaults
      responses:
        '200':
          description: Workspace connector defaults.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalConnectorDefaults'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: getApiSettingsApprovalConnectorsDefaults
    put:
      tags:
      - Approval Connectors
      summary: Update connector defaults
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalConnectorDefaultsUpdate'
      responses:
        '200':
          description: Updated workspace connector defaults.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalConnectorDefaults'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: putApiSettingsApprovalConnectorsDefaults
  /api/settings/approval-connectors/activity:
    get:
      tags:
      - Approval Connectors
      summary: Get connector activity
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
      responses:
        '200':
          description: Recent connector activity.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApprovalConnectorActivity'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: getApiSettingsApprovalConnectorsActivity
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  parameters:
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActionId:
      name: actionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CatalogId:
      name: catalogId
      in: path
      required: true
      schema:
        type: string
    PolicyName:
      name: policyName
      in: path
      required: true
      schema:
        type: string
    ConnectorId:
      name: connectorId
      in: path
      required: true
      schema:
        type: string
    ProviderName:
      name: providerName
      in: path
      required: true
      schema:
        type: string
    Namespace:
      name: namespace
      in: path
      required: true
      schema:
        type: string
    AgentName:
      name: agentName
      in: path
      required: true
      schema:
        type: string
    ToolName:
      name: toolName
      in: path
      required: true
      schema:
        type: string
    BuildId:
      name: buildId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request body or parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: State transition conflict or payload mismatch.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGateway:
      description: Upstream provider or agent request failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required:
      - error
      properties:
        error:
          type: string
    DeleteStatus:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - deleted
    ApprovalStatus:
      type: string
      enum:
      - PENDING
      - APPROVED
      - REJECTED
      - EXPIRED
    ApprovalScope:
      type: string
      enum:
      - once
      - run
      - agent_user_ttl
    AccessRequest:
      type: object
      required:
      - id
      - status
      properties:
        id:
          type: string
        subject:
          type: string
        agent_id:
          type: string
        tool_id:
          type: string
        status:
          $ref: '#/components/schemas/ApprovalStatus'
        duration:
          type: string
        scope:
          $ref: '#/components/schemas/ApprovalScope'
        approver_id:
          type: string
        reason:
          type: string
        action_id:
          type: string
        run_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    CreateAccessRequest:
      type: object
      required:
      - subject
      - tool_id
      properties:
        subject:
          type: string
        tool_id:
          type: string
        agent_id:
          type: string
        duration:
          type: string
        run_id:
          type: string
          format: uuid
        capability:
          type: string
        payload_hash:
          type: string
        tool_method:
          type: string
        tool_url:
          type: string
          format: uri
    ApprovalDecision:
      type: object
      properties:
        scope:
          $ref: '#/components/schemas/ApprovalScope'
        duration:
          type: string
        reason:
          type: string
    RejectionDecision:
      type: object
      properties:
        reason:
          type: string
    RunStatus:
      type: string
      enum:
      - RUNNING
      - PAUSED
      - PAUSED_APPROVAL
      - PAUSED_CONSENT
      - COMPLETED
      - FAILED
    Run:
      type: object
      required:
      - id
      - agent_id
      - user_id
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
        agent_id:
          type: string
        namespace:
          type: string
        user_id:
          type: string
        invoke_url:
          type: string
          format: uri
        status:
          $ref: '#/components/schemas/RunStatus'
        blocked_action_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateRun:
      type: object
      required:
      - agent_id
      - user_id
      properties:
        agent_id:
          type: string
        user_id:
          type: string
        conversation_id:
          type: string
        namespace:
          type: string
        invoke_url:
          type: string
          format: uri
    UpdateRunStatus:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - COMPLETED
          - FAILED
          - PAUSED_APPROVAL
          - RUNNING
    RunEventType:
      type: string
      enum:
      - USER_MESSAGE
      - AGENT_MESSAGE
      - TOOL_REQUEST
      - TOOL_RESPONSE
      - APPROVAL_REQUIRED
      - CONSENT_REQUIRED
      - APPROVED
      - REJECTED
      - RESUMED
      - RUN_CREATED
      - INVOKE_REQUESTED
      - INVOKE_COMPLETED
      - INVOKE_FAILED
      - TOOL_CALLED
      - COMPLETED
      - FAILED
    RunEvent:
      type: object
      required:
      - event_id
      - run_id
      - seq
      - type
      - timestamp
      properties:
        event_id:
          type: string
        run_id:
          type: string
          format: uuid
        seq:
          type: integer
        type:
          $ref: '#/components/schemas/RunEventType'
        actor:
          type: string
        payload_hash:
          type: string
        timestamp:
          type: string
          format: date-time
    CreateRunEvent:
      type: object
      required:
      - type
      properties:
        type:
          $ref: '#/components/schemas/RunEventType'
        payload_hash:
          type: string
        actor:
          type: string
    ActionStatus:
      type: string
      enum:
      - BLOCKED
      - APPROVED
      - EXECUTED
      - FAILED
      - EXPIRED
    BlockedAction:
      type: object
      required:
      - action_id
      - run_id
      - tool_id
      - status
      - created_at
      - updated_at
      properties:
        action_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        tool_id:
          type: string
        capability:
          type: string
        payload_hash:
          type: string
        status:
          $ref: '#/components/schemas/ActionStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateBlockedAction:
      type: object
      required:
      - tool_id
      properties:
        tool_id:
          type: string
        capability:
          type: string
        payload_hash:
          type: string
    ApproveBlockedAction:
      type: object
      properties:
        payload_hash:
          type: string
    CatalogEntry:
      type: object
      required:
      - id
      - name
      - summary
      properties:
        id:
          type: string
        name:
          type: string
        summary:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        latest_version:
          type: string
        required_integrations:
          type: array
          items:
            type: string
        governance_traits:
          type: array
          items:
            type: string
        complexity:
          type: string
    CatalogListResponse:
      type: object
      required:
      - generated_at
      - items
      - total
      - page
      - page_size
      properties:
        generated_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogEntry'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
    CatalogDeploymentTemplate:
      type: object
      properties:
        agentName:
          type: string
        systemPrompt:
          type: string
        requiredTools:
          type: array
          items:
            type: string
        policies:
          type: array
          items:
            type: string
        identityProvider:
          type: string
        sourceType:
          type: string
        sourceFiles:
          type: object
          additionalProperties:
            type: string
    CatalogManifest:
      type: object
      required:
      - id
      - version
      - name
      - summary
      properties:
        id:
          type: string
        version:
          type: string
        name:
          type: string
        summary:
          type: string
        defaultModel:
          type: string
        requiredIntegrations:
          type: array
          items:
            type: string
        governanceTraits:
          type: array
          items:
            type: string
        deploymentTemplate:
          $ref: '#/components/schemas/CatalogDeploymentTemplate'
    CatalogVersion:
      type: object
      required:
      - version
      - published_at
      properties:
        version:
          type: string
        published_at:
          type: string
          format: date-time
        summary:
          type: string
        changelog:
          type: string
    CatalogVersionsResponse:
      type: object
      required:
      - agent_id
      - versions
      properties:
        agent_id:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/CatalogVersion'
    DeployToolCreate:
      type: object
      required:
      - name
      - base_url
      properties:
        name:
          type: string
        base_url:
          type: string
          format: uri
        description:
          type: string
        auth_type:
          type: string
          enum:
          - None
          - APIKey
          - OAuth2
        port:
          type: integer
        scheme:
          type: string
          enum:
          - HTTP
          - HTTPS
    LlmConfig:
      type: object
      additionalProperties: true
    EnvVar:
      type: object
      additionalProperties: true
    DeployRequest:
      type: object
      required:
      - agent_name
      properties:
        agent_name:
          type: string
        namespace:
          type: string
        image:
          type: string
        source_files:
          type: object
          additionalProperties:
            type: string
        artifact_id:
          type: string
        draft_id:
          type: string
        system_prompt:
          type: string
        required_tools:
          type: array
          items:
            type: string
        tool_url_mappings:
          type: object
          additionalProperties:
            type: string
        tools_to_create:
          type: array
          items:
            $ref: '#/components/schemas/DeployToolCreate'
        llm_configs:
          type: array
          items:
            $ref: '#/components/schemas/LlmConfig'
        env:
          type: array
          items:
            $ref: '#/components/schemas/EnvVar'
        requirements:
          type: string
        entry_point:
          type: string
        framework:
          type: string
        identity_provider:
          type: string
        policies:
          type: array
          items:
            type: string
    DeployResponse:
      type: object
      required:
      - agent
      - namespace
      properties:
        agent:
          type: string
        namespace:
          type: string
        tools_created:
          type: array
          items:
            type: string
        build_id:
          type: string
        image_uri:
          type: string
        execution_mode:
          type: string
        build_required:
          type: boolean
        build_profile:
          type: string
        decision_reason:
          type: string
    StarterKitResponse:
      type: object
      properties:
        tool_created:
          type: string
        model_provider_created:
          type: string
    PolicyRule:
      type: object
      properties:
        permission:
          type: string
        operations:
          type: array
          items:
            type: string
        resource:
          type: string
    PolicyApprovalDelivery:
      type: object
      properties:
        connectors:
          type: array
          items:
            type: string
        mode:
          type: string
        fallbackToUI:
          type: boolean
    PolicyApprovalBinding:
      type: object
      properties:
        name:
          type: string
        toolIds:
          type: array
          items:
            type: string
        approvers:
          type: object
          additionalProperties: true
        defaultDuration:
          type: string
        delivery:
          $ref: '#/components/schemas/PolicyApprovalDelivery'
    PolicySpec:
      type: object
      properties:
        policies:
          type: array
          items:
            $ref: '#/components/schemas/PolicyRule'
        approvals:
          type: array
          items:
            $ref: '#/components/schemas/PolicyApprovalBinding'
    PolicyStatus:
      type: object
      properties:
        ready:
          type: boolean
        message:
          type: string
    PolicyUse:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
    Policy:
      type: object
      required:
      - name
      - spec
      properties:
        name:
          type: string
        namespace:
          type: string
        spec:
          $ref: '#/components/schemas/PolicySpec'
        status:
          $ref: '#/components/schemas/PolicyStatus'
        used_by:
          type: array
          items:
            $ref: '#/components/schemas/PolicyUse'
    PolicyUpsertRequest:
      type: object
      required:
      - name
      - spec
      properties:
        name:
          type: string
        spec:
          $ref: '#/components/schemas/PolicySpec'
    TranslatePolicyRequest:
      type: object
      required:
      - text
      properties:
        text:
          type: string
    TranslatePolicyResponse:
      type: object
      required:
      - rules
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/PolicyRule'
    ApprovalConnectorType:
      type: string
      enum:
      - webhook
      - slack
      - teams
      - jira
      - pagerduty
    ApprovalConnector:
      type: object
      required:
      - id
      - name
      - endpoint
      - enabled
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/ApprovalConnectorType'
        endpoint:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        enabled:
          type: boolean
        timeout_seconds:
          type: integer
        slack_security_mode:
          type: string
          enum:
          - compat
          - strict
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApprovalConnectorCreate:
      type: object
      required:
      - name
      - endpoint
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/ApprovalConnectorType'
        endpoint:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        enabled:
          type: boolean
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
        slack_security_mode:
          type: string
          enum:
          - compat
          - strict
    ApprovalConnectorPatch:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/ApprovalConnectorType'
        endpoint:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        enabled:
          type: boolean
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
        slack_security_mode:
          type: string
          enum:
          - compat
          - strict
    ApprovalConnectorCheck:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        status:
          type: string
        message:
          type: string
        duration_ms:
          type: integer
    ApprovalConnectorTestRequest:
      type: object
      required:
      - endpoint
      properties:
        type:
          $ref: '#/components/schemas/ApprovalConnectorType'
        endpoint:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 120
        slack_security_mode:
          type: string
          enum:
          - compat
          - strict
    ApprovalConnectorTestResult:
      type: object
      properties:
        status:
          type: string
        connector_type:
          type: string
        endpoint:
          type: string
        checks:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalConnectorCheck'
    ApprovalConnectorDefaults:
      type: object
      properties:
        default_delivery_mode:
          type: string
        default_fallback_to_ui:
          type: boolean
        default_timeout_seconds:
          type: integer
        min_timeout_seconds:
          type: integer
        max_timeout_seconds:
          type: integer
    ApprovalConnectorDefaultsUpdate:
      type: object
      properties:
        default_delivery_mode:
          type: string
        default_fallback_to_ui:
          type: boolean
        default_timeout_seconds:
          type: integer
    ApprovalConnectorActivity:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        event:
          type: string
        connector_id:
          type: string
        connector_name:
          type: string
        request_id:
          type: string
        decision:
          type: string
        status_code:
          type: integer
        duration_ms:
          type: integer
        message:
          type: string
    IdentityProviderSettings:
      type: object
      required:
      - issuer
      - jwksUri
      properties:
        issuer:
          type: string
          format: uri
        jwksUri:
          type: string
          format: uri
        audiences:
          type: array
          items:
            type: string
    IdentityProviderSpec:
      type: object
      required:
      - host
      - identityProvider
      - userIDClaim
      properties:
        host:
          type: string
        identityProvider:
          $ref: '#/components/schemas/IdentityProviderSettings'
        userIDClaim:
          type: string
        allowedDomains:
          type: array
          items:
            type: string
    IdentityProvider:
      type: object
      required:
      - name
      - spec
      properties:
        name:
          type: string
        namespace:
          type: string
        spec:
          $ref: '#/components/schemas/IdentityProviderSpec'
    IdentityProviderUpsertRequest:
