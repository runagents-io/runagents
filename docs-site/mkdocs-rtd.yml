site_name: RunAgents SDK & MCP Reference
site_url: https://runagents.readthedocs.io/en/latest/
site_description: Python SDK and MCP reference for RunAgents.
repo_url: https://github.com/runagents-io/runagents
repo_name: runagents

docs_dir: docs-rtd

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../sdk/python

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: install.md
  - Python SDK:
    - Overview: python/index.md
    - Approval Workflows: python/approvals.md
    - API Reference:
      - Client: python/api/client.md
      - Agent: python/api/agent.md
      - Run Context: python/api/runtime.md
      - Approval Types: python/api/approvals.md
  - MCP:
    - Overview: mcp/index.md
    - Tools: mcp/tools.md
  - Platform API:
    - Approvals: platform-api/approvals.md
  - Releases:
    - Overview: releases/index.md
