# Grants hr-assistant read access to the employee directory API.
#
# Apply with:
#   kubectl apply -f policy/employee-directory-binding.yaml

---
apiVersion: platform.ai/v1alpha1
kind: Policy
metadata:
  name: hr-assistant-employee-directory
  namespace: default
spec:
  policies:
    - permission: allow
      resource: https://directory.hr-api.your-company.com/*
      operations: [GET]

---
apiVersion: platform.ai/v1alpha1
kind: PolicyBinding
metadata:
  name: hr-assistant-employee-directory
  namespace: default
spec:
  subjects:
    - kind: ServiceAccount
      name: hr-assistant
      namespace: default
  policyRef:
    name: hr-assistant-employee-directory
