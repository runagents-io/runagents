site_name: RunAgents Documentation
site_url: https://docs.runagents.io
site_description: Deploy and orchestrate AI agents with secure, policy-driven access to external tools and services.
repo_url: https://github.com/runagents-io/runagents
repo_name: runagents

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss
  logo: assets/ionly.png
  favicon: assets/ionly.png
  icon:
    repo: fontawesome/brands/github

extra:
  version: !ENV [DOCS_VERSION, 'dev']
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/runagents-io/runagents
  generator: false
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_ID, 'G-XXXXXXXXXX']
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve by opening an issue on
            <a href="https://github.com/runagents-io/runagents/issues/new" target="_blank">GitHub</a>.

extra_css:
  - stylesheets/extra.css
  - stylesheets/openapi-docs.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/openapi-docs.js

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path:
        - docs
        - includes
        - docs-site/docs
        - docs-site/includes
      check_paths: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

