server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # HTML — always revalidate so new deploys are picked up immediately
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # MkDocs content-hashed assets (bundle.HASH.min.js etc.) — long cache is safe
    location ~* \.(js|css)$ {
        if ($uri ~* "\.[a-f0-9]{8,}\.(min\.)?(js|css)$") {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        # Non-hashed CSS/JS (extra.css, chat.js) — short cache, must revalidate
        expires 5m;
        add_header Cache-Control "public, must-revalidate, max-age=300";
    }

    # Images, fonts — long cache (content rarely changes)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # llms.txt and llms-full.txt — plain text, 1h cache
    location = /llms.txt {
        default_type text/plain;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /llms-full.txt {
        default_type text/plain;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # .well-known — JSON, 1h cache
    location /.well-known/ {
        default_type application/json;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # health check
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
