name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"
  EKS_CLUSTER: runagents-dev
  NAMESPACE: agent-system
  ECR_REGISTRY: 590183971896.dkr.ecr.us-east-1.amazonaws.com
  DOCS_IMAGE: 590183971896.dkr.ecr.us-east-1.amazonaws.com/runagents/docs
  GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID || 'G-KEXFB2EDZW' }}

jobs:
  validate:
    name: Validate MkDocs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: docs-site/requirements.txt

      - name: Install docs dependencies
        run: python -m pip install -r docs-site/requirements.txt

      - name: Build docs strictly
        run: mkdocs build --strict --config-file docs-site/mkdocs.yml

  deploy:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build and push docs image
        run: |
          image_tag="$(echo "$GITHUB_SHA" | cut -c1-7)"
          echo "IMAGE_TAG=$image_tag" >> "$GITHUB_ENV"
          docker build \
            --build-arg DOCS_VERSION="$image_tag" \
            --build-arg GOOGLE_ANALYTICS_ID="$GOOGLE_ANALYTICS_ID" \
            -t "$DOCS_IMAGE:$image_tag" \
            -t "$DOCS_IMAGE:latest" \
            -f docs-site/Dockerfile \
            docs-site/
          docker push "$DOCS_IMAGE:$image_tag"
          docker push "$DOCS_IMAGE:latest"

      - name: Install kubectl
        run: |
          curl -sSLO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Deploy docs to EKS
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"
          kubectl set image deployment/docs docs="$DOCS_IMAGE:$IMAGE_TAG" -n "$NAMESPACE"
          kubectl rollout status deployment/docs -n "$NAMESPACE" --timeout=180s

      - name: Smoke check docs site
        run: |
          for attempt in $(seq 1 12); do
            if curl -fsS https://docs.runagents.io/ >/dev/null; then
              echo "docs.runagents.io is reachable"
              exit 0
            fi
            sleep 10
          done
          echo "docs.runagents.io did not become reachable after deploy"
          exit 1
