name: Repo Consistency

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install repo consistency dependencies
        run: python -m pip install pyyaml==6.0.2

      - name: Check repo consistency
        run: python scripts/check_repo_consistency.py

      - name: Verify generated OpenAPI docs artifacts are synchronized
        run: python scripts/sync_openapi_artifacts.py --check

      - name: Install OpenAPI validator
        run: python -m pip install openapi-spec-validator==0.7.2

      - name: Validate OpenAPI contract
        run: openapi-spec-validator openapi/openapi.yaml
